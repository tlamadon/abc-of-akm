name: Test Notebook and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    container:
      image: quay.io/jupyter/scipy-notebook:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y graphviz jq

      - name: Install remaining Python packages
        run: pip install networkx graphviz

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        run: quarto install --no-prompt tinytex

      - name: Render site with Quarto
        run: quarto render

      - name: Render PDF
        run: quarto render jep.ipynb --to pdf --output jep.pdf

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: run-notebook
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
