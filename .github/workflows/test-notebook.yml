name: Test Notebook and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    container:
      image: quay.io/jupyter/scipy-notebook:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install remaining Python packages
        run: pip install networkx graphviz

      - name: Install Quarto
        run: |
          wget -qO quarto.deb https://github.com/quarto-dev/quarto-cli/releases/latest/download/quarto-linux-amd64.deb
          sudo dpkg -i quarto.deb
          rm quarto.deb

      - name: Install TinyTeX
        run: quarto install --no-prompt tinytex

      - name: Render site with Quarto
        run: quarto render

      - name: Render PDF
        run: quarto render jep.ipynb --to pdf --output jep.pdf

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: run-notebook
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
